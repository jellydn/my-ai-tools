model_personality = "pragmatic"
model = "gpt-5.5"
model_reasoning_effort = "medium"
approvals_reviewer = "guardian_subagent"
personality = "pragmatic"

notify = [
  "turn-ended",
]

[features]
unified_exec = true
shell_snapshot = true
apps = true
steer = true
personality = true
multi_agent = true
prevent_idle_sleep = true
js_repl = false
memories = true
external_migration = true

hooks = true
terminal_resize_reflow = true
goals = true
[sandbox_workspace_write]
network_access = true

[mcp_servers.context7]
command = "npx"
args = ["-y", "@upstash/context7-mcp"]

[mcp_servers.sequential-thinking]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-sequential-thinking"]

[mcp_servers.qmd]
command = "qmd"
args = ["mcp"]

[mcp_servers.fff]
command = "fff-mcp"
args = []

[mcp_servers.fff.tools.find_files]
approval_mode = "approve"

[mcp_servers.fff.tools.grep]
approval_mode = "approve"

[mcp_servers.fff.tools.multi_grep]
approval_mode = "approve"

[mcp_servers.react-grab-mcp]
command = "npx"
args = ["-y", "@react-grab/mcp", "--stdio"]

[mcp_servers.logpilot]
command = "logpilot"
args = ["mcp-server"]

[mcp_servers.agentmemory]
command = "npx"
args = ["-y", "@agentmemory/mcp"]

[mcp_servers.node_repl]
args = []
command = "/Applications/Codex.app/Contents/Resources/node_repl"
startup_timeout_sec = 120

[mcp_servers.node_repl.env]
BROWSER_USE_AVAILABLE_BACKENDS = "chrome,iab"
BROWSER_USE_MARKETPLACE_NAME = "openai-bundled"
CODEX_CLI_PATH = "/Applications/Codex.app/Contents/Resources/codex"
CODEX_HOME = "$HOME/.codex"
NODE_REPL_NATIVE_PIPE_CONNECT_TIMEOUT_MS = "1000"
NODE_REPL_NODE_MODULE_DIRS = ""
NODE_REPL_NODE_PATH = "/Applications/Codex.app/Contents/Resources/node"
NODE_REPL_TRUSTED_BROWSER_CLIENT_SHA256S = "167fdf579477181fba1773c1efb067b00c5a64fe85dafb50a2001bde198dc739"
NODE_REPL_TRUSTED_CODE_PATHS = "$HOME/.codex"
NODE_REPL_UNTRUSTED_ENV_ALLOWLIST = "BROWSER_USE_MARKETPLACE_NAME"
SKY_CUA_SERVICE_PATH = "$HOME/.codex/.tmp/bundled-marketplaces/openai-bundled/plugins/computer-use/Codex Computer Use.app"

[notice]
fast_default_opt_out = true

[notice.model_migrations]
"gpt-5.2-codex" = "gpt-5.3-codex"
"gpt-5.3-codex" = "gpt-5.4"

[notice.external_config_migration_prompts]
home_last_prompted_at = 0
home = true

[tui]
status_line = [
  "model-with-reasoning",
  "context-remaining",
  "five-hour-limit",
  "weekly-limit",
  "task-progress",
  "pull-request-number",
  "fast-mode",
]
theme = "kanagawa"
status_line_use_colors = true

[memories]
disable_on_external_context = true

[desktop]
ambient-suggestions-enabled = true
appearanceLightCodeThemeId = "rose-pine"
appearanceDarkCodeThemeId = "dracula"
sansFontSize = 14
codeFontSize = 13
usePointerCursors = true
dictationDictionary = []
followUpQueueMode = "steer"
reviewDelivery = "detached"
preventSleepWhileRunning = true
keepRemoteControlAwakeWhilePluggedIn = true
git-branch-prefix = "jellydn/"
git-pull-request-merge-method = "squash"
git-show-sidebar-pr-icons = true
git-commit-instructions = "Write clear, informative commit messages that explain the what and why behind changes, not just the how. Follow the commit-zen convention"
git-pr-instructions = "Draft PR first with What Why How on PR description"
conversationDetailMode = "STEPS_COMMANDS"

[desktop.appearanceLightChromeTheme]
accent = "#d7827e"
contrast = 45
ink = "#575279"
opaqueWindows = false
surface = "#faf4ed"

[desktop.appearanceLightChromeTheme.fonts]

[desktop.appearanceLightChromeTheme.semanticColors]
diffAdded = "#56949f"
diffRemoved = "#797593"
skill = "#907aa9"

[desktop.appearanceDarkChromeTheme]
accent = "#ff79c6"
contrast = 60
ink = "#f8f8f2"
opaqueWindows = false
surface = "#282a36"

[desktop.appearanceDarkChromeTheme.fonts]

[desktop.appearanceDarkChromeTheme.semanticColors]
diffAdded = "#50fa7b"
diffRemoved = "#ff5555"
skill = "#ff79c6"

[desktop.open-in-target-preferences]
global = "vscodeInsiders"
