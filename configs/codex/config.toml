model_personality = "pragmatic"
model = "gpt-5.5"
model_reasoning_effort = "medium"
approvals_reviewer = "guardian_subagent"
personality = "pragmatic"

# Notify the Codex Computer Use client when a turn ends.
# Restored to match the desktop app's --previous-notify protocol.

[features]
unified_exec = true
shell_snapshot = true
apps = true
steer = true
personality = true
multi_agent = true
prevent_idle_sleep = true
js_repl = false
memories = true
external_migration = true

hooks = true
terminal_resize_reflow = true
goals = true
[sandbox_workspace_write]
network_access = true

[mcp_servers.context7]
type = "stdio"
command = "npx"
args = ["-y", "@upstash/context7-mcp@latest"]

[mcp_servers.sequential-thinking]
type = "stdio"
command = "npx"
args = ["-y", "@modelcontextprotocol/server-sequential-thinking"]

[mcp_servers.qmd]
type = "stdio"
command = "qmd"
args = ["mcp"]

[mcp_servers.fff]
type = "stdio"
command = "fff-mcp"

[mcp_servers.react-grab-mcp]
type = "stdio"
command = "npx"
args = ["-y", "@react-grab/mcp", "--stdio"]

[mcp_servers.sem]
type = "stdio"
command = "sem-mcp"

[mcp_servers.logpilot]
type = "stdio"
command = "logpilot"
args = ["mcp-server"]

[mcp_servers.agentmemory]
type = "stdio"
command = "npx"
args = ["-y", "@agentmemory/mcp"]

[mcp_servers.agentmemory.env]
AGENTMEMORY_URL = "${AGENTMEMORY_URL:-http://localhost:3111}"
AGENTMEMORY_SECRET = "${AGENTMEMORY_SECRET:-}"
AGENTMEMORY_TOOLS = "${AGENTMEMORY_TOOLS:-all}"

[mcp_servers.ctx]
type = "stdio"
command = "ctx"
args = ["mcp", "serve"]

[notice]
fast_default_opt_out = true
hide_rate_limit_model_nudge = true

[notice.model_migrations]
"gpt-5.2-codex" = "gpt-5.3-codex"
"gpt-5.3-codex" = "gpt-5.4"

[notice.external_config_migration_prompts]
home_last_prompted_at = 0
home = true

[tui]
status_line = [
  "model-with-reasoning",
  "context-remaining",
  "five-hour-limit",
  "weekly-limit",
  "task-progress",
  "pull-request-number",
  "fast-mode",
]
theme = "kanagawa"
status_line_use_colors = true

[tui.model_availability_nux]
"gpt-5.5" = 4

[memories]
disable_on_external_context = true

[desktop]
ambient-suggestions-enabled = true
appearanceLightCodeThemeId = "rose-pine"
appearanceDarkCodeThemeId = "rose-pine"
sansFontSize = 14
codeFontSize = 13
usePointerCursors = true
dictationDictionary = []
followUpQueueMode = "steer"
reviewDelivery = "detached"
preventSleepWhileRunning = true
keepRemoteControlAwakeWhilePluggedIn = true
git-branch-prefix = "jellydn/"
git-pull-request-merge-method = "squash"
git-show-sidebar-pr-icons = true
git-commit-instructions = "Write clear, informative commit messages that explain the what and why behind changes, not just the how. Follow the Commitizen-style format: type(scope): subject."
git-pr-instructions = "Draft PR first with What Why How on PR description"
conversationDetailMode = "STEPS_COMMANDS"
show-context-window-usage = true
composerEnterBehavior = "cmdIfMultiline"
hotkey-window-projectless-default-enabled = true

[desktop.appearanceLightChromeTheme]
accent = "#d7827e"
contrast = 45
ink = "#575279"
opaqueWindows = false
surface = "#faf4ed"

[desktop.appearanceLightChromeTheme.fonts]

[desktop.appearanceLightChromeTheme.semanticColors]
diffAdded = "#56949f"
diffRemoved = "#797593"
skill = "#907aa9"

[desktop.appearanceDarkChromeTheme]
accent = "#ea9a97"
contrast = 60
ink = "#e0def4"
opaqueWindows = false
surface = "#232136"

[desktop.appearanceDarkChromeTheme.fonts]

[desktop.appearanceDarkChromeTheme.semanticColors]
diffAdded = "#9ccfd8"
diffRemoved = "#908caa"
skill = "#c4a7e7"

[desktop.open-in-target-preferences]
global = "cursor"

[plugins."gmail@openai-curated"]
enabled = true

[plugins."github@openai-curated"]
enabled = true

[plugins."documents@openai-primary-runtime"]
enabled = true

[plugins."spreadsheets@openai-primary-runtime"]
enabled = true

[plugins."presentations@openai-primary-runtime"]
enabled = true

[plugins."computer-use@openai-bundled"]
enabled = true

[plugins."pdf@openai-primary-runtime"]
enabled = true

[plugins."browser@openai-bundled"]
enabled = true

[plugins."chrome@openai-bundled"]
enabled = true

[plugins."template-creator@openai-primary-runtime"]
enabled = true
