model_personality = "pragmatic"
model = "gpt-5.5"
model_reasoning_effort = "medium"

[features]
unified_exec = true
shell_snapshot = true
apps = true
steer = true
personality = true
multi_agent = true
prevent_idle_sleep = true
js_repl = true
memories = true
external_migration = true

[sandbox_workspace_write]
network_access = true

[mcp_servers.context7]
command = "npx"
args = ["-y", "@upstash/context7-mcp"]

[mcp_servers.sequential-thinking]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-sequential-thinking"]

[mcp_servers.qmd]
command = "qmd"
args = ["mcp"]

[mcp_servers.fff]
command = "fff-mcp"
args = []

[mcp_servers.fff.tools.find_files]
approval_mode = "approve"

[mcp_servers.fff.tools.grep]
approval_mode = "approve"

[mcp_servers.fff.tools.multi_grep]
approval_mode = "approve"

[mcp_servers.react-grab-mcp]
command = "npx"
args = ["-y", "@react-grab/mcp", "--stdio"]

[mcp_servers.notion]
url = "https://mcp.notion.com/mcp"

[notice.model_migrations]
"gpt-5.2-codex" = "gpt-5.3-codex"
"gpt-5.3-codex" = "gpt-5.4"

[tui]
status_line = ["model-with-reasoning", "context-remaining", "five-hour-limit", "context-used"]
theme = "kanagawa"

[plugins."github@openai-curated"]
enabled = true

[projects."/Users/huynhdung/src/tries/2026-04-22-jellydn-my-ai-tools"]
trust_level = "trusted"

[projects."/Users/huynhdung/src/tries/2026-02-26-aircarbon-ac-monorepo2"]
trust_level = "trusted"
