model_personality = "pragmatic"
model = "gpt-5.5"
model_reasoning_effort = "medium"
approvals_reviewer = "guardian_subagent"
personality = "pragmatic"

# Notify the Codex Computer Use client when a turn ends.
# Restored to match the desktop app's --previous-notify protocol.


notify = ["$HOME/.codex/computer-use/Codex Computer Use.app/Contents/SharedSupport/SkyComputerUseClient.app/Contents/MacOS/SkyComputerUseClient", "turn-ended", "--previous-notify", "[\"turn-ended\"]"]

[features]
unified_exec = true
shell_snapshot = true
apps = true
steer = true
personality = true
multi_agent = true
prevent_idle_sleep = true
js_repl = false
memories = true
external_migration = true

hooks = true
terminal_resize_reflow = true
goals = true
[sandbox_workspace_write]
network_access = true

[mcp_servers.context7]
type = "stdio"
command = "npx"
args = ["-y", "@upstash/context7-mcp@latest"]

[mcp_servers.sequential-thinking]
type = "stdio"
command = "npx"
args = ["-y", "@modelcontextprotocol/server-sequential-thinking"]

[mcp_servers.qmd]
type = "stdio"
command = "qmd"
args = ["mcp"]

[mcp_servers.fff]
type = "stdio"
command = "fff-mcp"

[mcp_servers.react-grab-mcp]
type = "stdio"
command = "npx"
args = ["-y", "@react-grab/mcp", "--stdio"]

[mcp_servers.sem]
type = "stdio"
command = "sem-mcp"

[mcp_servers.logpilot]
type = "stdio"
command = "logpilot"
args = ["mcp-server"]

[mcp_servers.agentmemory]
type = "stdio"
command = "npx"
args = ["-y", "@agentmemory/mcp"]

[mcp_servers.agentmemory.env]
AGENTMEMORY_URL = "${AGENTMEMORY_URL:-http://localhost:3111}"
AGENTMEMORY_SECRET = "${AGENTMEMORY_SECRET:-}"
AGENTMEMORY_TOOLS = "${AGENTMEMORY_TOOLS:-all}"

[mcp_servers.node_repl]
type = "stdio"
command = "/Applications/Codex.app/Contents/Resources/node_repl"
startup_timeout_sec = 120

[mcp_servers.node_repl.env]
BROWSER_USE_AVAILABLE_BACKENDS = "chrome,iab"
BROWSER_USE_CODEX_APP_BUILD_FLAVOR = "prod"
BROWSER_USE_CODEX_APP_VERSION = "26.602.71036"
CODEX_CLI_PATH = "/Applications/Codex.app/Contents/Resources/codex"
CODEX_HOME = "$HOME/.codex"
NODE_REPL_INSTRUCTIONS_USE_CASE_BROWSER = "Control the in-app browser in conjunction with the Browser Plugin."
NODE_REPL_INSTRUCTIONS_USE_CASE_CHROME = "Control the Chrome browser in conjunction with the Chrome Plugin. Prefer this method of controlling Chrome over alternatives (such as Computer Use) unless the user explicitly mentions an alternative."
NODE_REPL_NATIVE_PIPE_CONNECT_TIMEOUT_MS = "1000"
NODE_REPL_NODE_MODULE_DIRS = ""
NODE_REPL_NODE_PATH = "/Applications/Codex.app/Contents/Resources/node"
NODE_REPL_TRUSTED_BROWSER_CLIENT_SHA256S = "4946b004b23af02244ece97240aceb8d123475207fa6a6fc399486bd7086049f"
NODE_REPL_TRUSTED_CODE_PATHS = "$HOME/.codex"

[notice]
fast_default_opt_out = true

[notice.model_migrations]
"gpt-5.2-codex" = "gpt-5.3-codex"
"gpt-5.3-codex" = "gpt-5.4"

[notice.external_config_migration_prompts]
home_last_prompted_at = 0
home = true

[tui]
status_line = [
  "model-with-reasoning",
  "context-remaining",
  "five-hour-limit",
  "weekly-limit",
  "task-progress",
  "pull-request-number",
  "fast-mode",
]
theme = "kanagawa"
status_line_use_colors = true

[tui.model_availability_nux]
"gpt-5.5" = 3

[memories]
disable_on_external_context = true

[desktop]
ambient-suggestions-enabled = true
appearanceLightCodeThemeId = "rose-pine"
appearanceDarkCodeThemeId = "dracula"
sansFontSize = 14
codeFontSize = 13
usePointerCursors = true
dictationDictionary = []
followUpQueueMode = "steer"
reviewDelivery = "detached"
preventSleepWhileRunning = true
keepRemoteControlAwakeWhilePluggedIn = true
git-branch-prefix = "jellydn/"
git-pull-request-merge-method = "squash"
git-show-sidebar-pr-icons = true
git-commit-instructions = "Write clear, informative commit messages that explain the what and why behind changes, not just the how. Follow the Commitizen-style format: type(scope): subject."
git-pr-instructions = "Draft PR first with What Why How on PR description"
conversationDetailMode = "STEPS_COMMANDS"
show-context-window-usage = true
composerEnterBehavior = "cmdIfMultiline"
hotkey-window-projectless-default-enabled = true

