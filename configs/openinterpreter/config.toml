# Open Interpreter user config (~/.openinterpreter/config.toml)
# Docs: https://www.openinterpreter.com/cli/docs/config
# Codex fork: enable the same harness features you used in ~/.codex/

[features]
hooks = true
multi_agent = true
shell_snapshot = true
unified_exec = true
memories = true
personality = true
steer = true
goals = true

[sandbox_workspace_write]
network_access = true

[mcp_servers.context7]
command = "npx"
args = ["-y", "@upstash/context7-mcp"]

[mcp_servers.sequential-thinking]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-sequential-thinking"]

[mcp_servers.qmd]
command = "qmd"
args = ["mcp"]

[mcp_servers.fff]
command = "fff-mcp"
args = []

[mcp_servers.react-grab-mcp]
command = "npx"
args = ["-y", "@react-grab/mcp", "--stdio"]

[mcp_servers.logpilot]
command = "logpilot"
args = ["mcp-server"]

[mcp_servers.agentmemory]
command = "npx"
args = ["-y", "@agentmemory/mcp"]

[mcp_servers.agentmemory.env]
AGENTMEMORY_URL = "${AGENTMEMORY_URL:-http://localhost:3111}"
AGENTMEMORY_SECRET = "${AGENTMEMORY_SECRET:-}"
AGENTMEMORY_TOOLS = "${AGENTMEMORY_TOOLS:-all}"

[mcp_servers.sem]
command = "sem-mcp"
args = []

[mcp_servers.ctx]
command = "ctx"
args = ["mcp", "serve"]

[mcp_servers.codebase-memory-mcp]
command = "codebase-memory-mcp"
args = []
