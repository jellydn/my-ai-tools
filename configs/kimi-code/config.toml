command = "bash '$HOME/.kimi-code/hooks/herdr-agent-state.sh' working"
timeout = 10

[[hooks]]
event = "PreToolUse"
command = "bash '$HOME/.kimi-code/hooks/herdr-agent-state.sh' working"
timeout = 10

[[hooks]]
event = "SubagentStart"
command = "bash '$HOME/.kimi-code/hooks/herdr-agent-state.sh' working"
timeout = 10

[[hooks]]
event = "PreCompact"
command = "bash '$HOME/.kimi-code/hooks/herdr-agent-state.sh' working"
timeout = 10

[[hooks]]
event = "PermissionRequest"
command = "bash '$HOME/.kimi-code/hooks/herdr-agent-state.sh' blocked"
