reserved_context_size = 50000

[[permission.rules]]
decision = "allow"
scope = "user"
pattern = "Read"

[[permission.rules]]
decision = "allow"
scope = "user"
pattern = "Grep"

[[permission.rules]]
decision = "ask"
scope = "user"
pattern = "Bash"

