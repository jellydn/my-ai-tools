pool:
    api_url: https://inference.poolside.ai
mcp_servers:
    agentmemory:
        command: npx
        args:
            - -y
            - '@agentmemory/mcp'
    context7:
        command: npx
        args:
            - -y
            - '@upstash/context7-mcp@latest'
    fff:
        command: fff-mcp
    logpilot:
        command: logpilot
        args:
            - mcp-server
    qmd:
        command: qmd
        args:
            - mcp
    react-grab-mcp:
        command: npx
        args:
            - -y
            - '@react-grab/mcp'
            - --stdio
    sem:
        command: sem-mcp
    sequential-thinking:
        command: npx
        args:
            - -y
            - '@modelcontextprotocol/server-sequential-thinking'
