# Kanagawa Wave — palette from https://github.com/rebelot/kanagawa.nvim
# Aligned with configs/pi/themes/kanagawa.json and configs/codex/themes/kanagawa.tmTheme
#
# Grok Build 0.2.22 ships: groknight, grokday, tokyonight, rosepine-moon, oscura-midnight.
# Set [ui].theme = "kanagawa" in config.toml once Grok loads ~/.grok/themes/*.toml (or adds a built-in).

name = "kanagawa"
aliases = ["kanagawa-wave", "kanagawa-wave-dark", "wave"]
requires_truecolor = true

[colors]
bg_base = "#1F1F28"
bg_light = "#2A2A37"
bg_dark = "#16161D"
