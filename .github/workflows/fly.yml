name: Fly Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency: deploy-group
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Validate required secrets
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          missing=0

          if [ -z "$FLY_API_TOKEN" ]; then
            echo "::error::GitHub secret FLY_API_TOKEN is not set. Add a Fly deploy token in Settings → Secrets and variables → Actions."
            missing=1
          fi

          if [ -z "$OPENAI_API_KEY" ]; then
            echo "::error::GitHub secret OPENAI_API_KEY is not set. Add your OpenRouter key (sk-or-v1-...) as OPENAI_API_KEY."
            missing=1
          elif ! printf '%s' "$OPENAI_API_KEY" | grep -q '^sk-or-v1-'; then
            echo "::error::OPENAI_API_KEY must be an OpenRouter key (prefix sk-or-v1-). fly.toml uses https://openrouter.ai/api/v1 — an OpenAI sk-proj- key will fail with 401 during image build."
            missing=1
          fi

          exit "$missing"

      - name: Import OpenRouter API key to Fly
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: flyctl secrets set OPENAI_API_KEY="$OPENAI_API_KEY"

      - name: Deploy to Fly.io
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          flyctl deploy --remote-only --build-secret "OPENAI_API_KEY=${OPENAI_API_KEY}"
