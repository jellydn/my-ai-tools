name: Fly Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency: deploy-group
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Validate required secrets
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          missing=0

          if [ -z "$FLY_API_TOKEN" ]; then
            echo "::error::GitHub secret FLY_API_TOKEN is not set. Add a Fly deploy token in Settings → Secrets and variables → Actions."
            missing=1
          fi

          EFFECTIVE_OPENAI_API_KEY="${OPENROUTER_API_KEY:-$OPENAI_API_KEY}"
          EFFECTIVE_OPENAI_API_KEY="$(printf '%s' "$EFFECTIVE_OPENAI_API_KEY" | tr -d '\r\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"

          if [ -z "$EFFECTIVE_OPENAI_API_KEY" ]; then
            echo "::error::Set GitHub secret OPENROUTER_API_KEY (recommended) or OPENAI_API_KEY to your OpenRouter key (sk-or-v1-...)."
            missing=1
          elif ! printf '%s' "$EFFECTIVE_OPENAI_API_KEY" | grep -q '^sk-or-v1-'; then
            echo "::error::The configured OpenRouter secret must start with sk-or-v1-. fly.toml uses https://openrouter.ai/api/v1 — an OpenAI sk-proj- key in OPENAI_API_KEY will fail here and with 401 during image build."
            missing=1
          fi

          exit "$missing"

      - name: Import OpenRouter API key to Fly
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          EFFECTIVE_OPENAI_API_KEY="${OPENROUTER_API_KEY:-$OPENAI_API_KEY}"
          EFFECTIVE_OPENAI_API_KEY="$(printf '%s' "$EFFECTIVE_OPENAI_API_KEY" | tr -d '\r\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"

          # Fly control plane occasionally returns transient 5xx/503 on secrets set.
          attempt=1
          max_attempts=5
          delay=5
          while true; do
            if flyctl secrets set OPENAI_API_KEY="$EFFECTIVE_OPENAI_API_KEY"; then
              break
            fi
            if [ "$attempt" -ge "$max_attempts" ]; then
              echo "::error::flyctl secrets set failed after ${max_attempts} attempts"
              exit 1
            fi
            echo "flyctl secrets set failed (attempt ${attempt}/${max_attempts}); retrying in ${delay}s..."
            sleep "$delay"
            attempt=$((attempt + 1))
            delay=$((delay * 2))
          done

      - name: Deploy to Fly.io
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          EFFECTIVE_OPENAI_API_KEY="${OPENROUTER_API_KEY:-$OPENAI_API_KEY}"
          EFFECTIVE_OPENAI_API_KEY="$(printf '%s' "$EFFECTIVE_OPENAI_API_KEY" | tr -d '\r\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"

          attempt=1
          max_attempts=3
          delay=10
          while true; do
            if flyctl deploy --remote-only --build-secret "OPENAI_API_KEY=${EFFECTIVE_OPENAI_API_KEY}"; then
              break
            fi
            if [ "$attempt" -ge "$max_attempts" ]; then
              echo "::error::flyctl deploy failed after ${max_attempts} attempts"
              exit 1
            fi
            echo "flyctl deploy failed (attempt ${attempt}/${max_attempts}); retrying in ${delay}s..."
            sleep "$delay"
            attempt=$((attempt + 1))
            delay=$((delay * 2))
          done
